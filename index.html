<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Voting Bar Chart</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap');

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #3b1f1f, #7a4a1c, #b08d2a);
    color: white;
}

/* MENU */
#menu {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 40px;
}

input, button {
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
}

button {
    cursor: pointer;
    background: gold;
    font-weight: bold;
}

#list {
    margin-top: 20px;
    width: 300px;
}

.item {
    background: rgba(255,255,255,0.1);
    padding: 8px;
    margin: 5px;
    border-radius: 8px;
    cursor: pointer;
}

/* CHART */
#chartWrapper {
    display: none;
    padding: 30px;
}

#chartArea {
    display: flex;
}

/* Y AXIS */
#yAxis {
    width: 60px;
    height: 400px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    font-size: 12px;
    opacity: 0.8;
}

/* CHART */
#chart {
    flex: 1;
    height: 400px;
    border-left: 2px solid rgba(255,255,255,0.4);
    border-bottom: 2px solid rgba(255,255,255,0.4);
    display: flex;
    align-items: flex-end;
    gap: 20px;
    padding-left: 10px;
}

/* BAR */
.barContainer {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    height: 100%;
    width: 70px;
}

.bar {
    width: 40px;
    background: gold;
    border-radius: 8px 8px 0 0;
    box-shadow: 0 0 12px gold;
    transition: height 0.5s;
}

/* NAME UNDER BAR */
.nameLabel {
    margin-top: 6px;
    font-size: 12px;
}

/* WIN PANEL */
#winPanel {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.85);
    padding: 40px;
    border-radius: 20px;
    display: none;
    text-align: center;
    box-shadow: 0 0 20px gold;
    font-size: 22px;
}
</style>
</head>

<body>

<div id="menu">
    <h1>Voting Simulator</h1>

    <input id="name" placeholder="Name">
    <input id="votes" type="number" placeholder="Ziel Votes">
    <input id="time" type="number" value="3" placeholder="Sekunden pro Vote">

    <button onclick="add()">Hinzufügen</button>
    <button onclick="start()">Play</button>

    <div id="list"></div>
</div>

<div id="chartWrapper">
    <div id="chartArea">
        <div id="yAxis"></div>
        <div id="chart"></div>
    </div>
</div>

<div id="winPanel"></div>

<script>
let data = [];

function add() {
    let name = document.getElementById("name").value;
    let votes = parseInt(document.getElementById("votes").value);

    if (!name || isNaN(votes)) return;

    data.push({ name, votes, current: 0 });
    renderList();
}

function renderList() {
    let list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach((d, i) => {
        let div = document.createElement("div");
        div.className = "item";
        div.innerText = d.name + " (" + d.votes + ")";
        div.onclick = () => {
            data.splice(i, 1);
            renderList();
        };
        list.appendChild(div);
    });
}

function start() {
    if (data.length === 0) return;

    document.getElementById("menu").style.display = "none";
    document.getElementById("chartWrapper").style.display = "block";

    let maxVotes = Math.max(...data.map(d => d.votes));

    renderChart(maxVotes);

    let interval = parseInt(document.getElementById("time").value) * 1000;

    let timer = setInterval(() => {

        data.forEach(d => {
            if (d.current < d.votes) d.current++;
        });

        renderChart(maxVotes);

        if (data.every(d => d.current >= d.votes)) {
            clearInterval(timer);
            showWinner();
        }

    }, interval);
}

function renderChart(maxVotes) {
    let chart = document.getElementById("chart");
    let yAxis = document.getElementById("yAxis");

    chart.innerHTML = "";
    yAxis.innerHTML = "";

    // Y AXIS (0 bis maxVotes)
    for (let i = maxVotes; i >= 0; i -= Math.ceil(maxVotes / 5)) {
        let label = document.createElement("div");
        label.innerText = i;
        yAxis.appendChild(label);
    }

    data.forEach(d => {

        let container = document.createElement("div");
        container.className = "barContainer";

        let bar = document.createElement("div");
        bar.className = "bar";

        let height = (d.current / maxVotes) * 350;
        bar.style.height = height + "px";

        let name = document.createElement("div");
        name.className = "nameLabel";
        name.innerText = d.name;

        container.appendChild(bar);
        container.appendChild(name);

        chart.appendChild(container);
    });
}

function showWinner() {
    let winner = data.reduce((a,b) => a.current > b.current ? a : b);

    let panel = document.getElementById("winPanel");
    panel.innerHTML = "🏆 Gewinner:<br><b>" + winner.name + "</b>";
    panel.style.display = "block";

    setTimeout(() => location.reload(), 5000);
}
</script>

</body>
</html>
