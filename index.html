<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Animiertes Voting Diagramm</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap');

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #3b1f1f, #7a4a1c, #b08d2a);
    color: white;
    overflow-x: hidden;
}

/* STARTMENÜ */
#menu {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 40px;
}

input, button {
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
}

button {
    cursor: pointer;
    background: gold;
    color: black;
    font-weight: bold;
}

button:hover {
    transform: scale(1.05);
}

#list {
    margin-top: 20px;
    width: 300px;
}

.item {
    background: rgba(255,255,255,0.1);
    padding: 8px;
    margin: 5px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
}

/* DIAGRAMM */
#chartContainer {
    display: none;
    padding: 20px;
}

.barRow {
    display: flex;
    align-items: center;
    margin: 10px 0;
}

.name {
    width: 120px;
}

.bar {
    height: 25px;
    background: gold;
    width: 0%;
    transition: width 0.5s;
    border-radius: 8px;
    box-shadow: 0 0 10px gold;
}

/* WINNER PANEL */
#winPanel {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.8);
    padding: 40px;
    border-radius: 20px;
    display: none;
    text-align: center;
    font-size: 22px;
    box-shadow: 0 0 20px gold;
}
</style>
</head>
<body>

<div id="menu">
    <h1>Voting Simulator</h1>

    <input id="name" placeholder="Name">
    <input id="votes" type="number" placeholder="Ziel Votes">

    <input id="time" type="number" placeholder="Sekunden pro Vote (z.B. 3)" value="3">

    <button onclick="add()">Hinzufügen</button>
    <button onclick="start()">Play</button>

    <div id="list"></div>
</div>

<div id="chartContainer"></div>

<div id="winPanel"></div>

<script>
let data = [];

function add() {
    let name = document.getElementById("name").value;
    let votes = parseInt(document.getElementById("votes").value);

    if (!name || isNaN(votes)) return;

    data.push({ name, votes, current: 0 });
    renderList();
}

function renderList() {
    let list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach((d, i) => {
        let div = document.createElement("div");
        div.className = "item";
        div.innerHTML = d.name + " (" + d.votes + ")";
        div.onclick = () => {
            data.splice(i, 1);
            renderList();
        };
        list.appendChild(div);
    });
}

function start() {
    if (data.length === 0) return;

    document.getElementById("menu").style.display = "none";
    document.getElementById("chartContainer").style.display = "block";

    renderChart();

    let interval = parseInt(document.getElementById("time").value) * 1000;

    let timer = setInterval(() => {
        data.forEach(d => {
            if (d.current < d.votes) d.current++;
        });

        renderChart();

        if (data.every(d => d.current >= d.votes)) {
            clearInterval(timer);
            showWinner();
        }
    }, interval);
}

function renderChart() {
    let container = document.getElementById("chartContainer");
    container.innerHTML = "";

    data.forEach(d => {
        let row = document.createElement("div");
        row.className = "barRow";

        let name = document.createElement("div");
        name.className = "name";
        name.innerText = d.name;

        let bar = document.createElement("div");
        bar.className = "bar";

        let percent = (d.current / d.votes) * 100;
        bar.style.width = percent + "%";

        row.appendChild(name);
        row.appendChild(bar);
        container.appendChild(row);
    });
}

function showWinner() {
    let winner = data.reduce((a,b) => a.current > b.current ? a : b);

    let panel = document.getElementById("winPanel");
    panel.innerHTML = "🏆 Gewinner: <br><b>" + winner.name + "</b>";
    panel.style.display = "block";

    setTimeout(() => {
        location.reload();
    }, 5000);
}
</script>

</body>
</html>
