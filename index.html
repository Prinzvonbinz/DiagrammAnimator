<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Golden Voting Chart</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Poppins, sans-serif;
    background: radial-gradient(circle at top, #4a1f17, #2a0f0b 55%, #120705);
    color: #fff;
    overflow: hidden;
}

/* ===== MENU ===== */
#menu {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
}

h1 {
    font-family: "Playfair Display", serif;
    font-size: 52px;
    color: gold;
    text-shadow: 0 0 18px rgba(255,215,0,0.3);
}

input {
    width: 240px;
    padding: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
}

button {
    padding: 10px 14px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    background: linear-gradient(145deg, #d4af37, #8b6b1f);
    font-weight: 600;
    color: black;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
}

/* LIST */
#list {
    width: 260px;
    margin-top: 10px;
}

.item {
    background: rgba(255,255,255,0.08);
    padding: 8px;
    margin: 5px 0;
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
    cursor: pointer;
}

.item:hover {
    background: rgba(255,215,0,0.15);
}

/* ===== GAME ===== */
#game {
    display: none;
    position: absolute;
    inset: 0;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 80px;
}

#chart {
    display: flex;
    gap: 35px;
    align-items: flex-end;
    height: 70%;
}

/* BAR */
.barWrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 80px;
}

.bar {
    width: 50px;
    height: 0px;
    border-radius: 10px 10px 0 0;
    background: linear-gradient(to top, #b8860b, gold);
    box-shadow: 0 0 18px rgba(255,215,0,0.25);
    transition: height 0.35s ease;
}

.label {
    margin-top: 10px;
    font-size: 14px;
    color: #f5e6c8;
}

/* WINNER */
#winner {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.75);
}

#winnerBox {
    background: radial-gradient(circle, #3a1a13, #120705);
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 0 25px gold;
}

#trophy {
    font-size: 80px;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu">
    <h1>Voting Arena</h1>

    <input id="name" placeholder="Name">
    <input id="votes" type="number" placeholder="Ziel-Votes">

    <button onclick="add()">Hinzufügen</button>

    <div id="list"></div>

    <input id="speed" type="number" value="2" placeholder="Sekunden pro Vote">

    <button onclick="start()">Play</button>
</div>

<!-- GAME -->
<div id="game">
    <div id="chart"></div>
</div>

<!-- WIN -->
<div id="winner">
    <div id="winnerBox">
        <div id="trophy">🏆</div>
        <h2 id="winnerText"></h2>
    </div>
</div>

<script>

let data = [];
let progress = {};
let timer = null;

/* ===== ADD ===== */
function add() {
    const n = document.getElementById("name");
    const v = document.getElementById("votes");

    if(!n.value || !v.value) return;

    data.push({
        name: n.value,
        target: parseInt(v.value)
    });

    n.value = "";
    v.value = "";

    renderList();
}

/* ===== LIST ===== */
function renderList() {
    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach((d, i) => {
        const div = document.createElement("div");
        div.className = "item";
        div.innerHTML = `${d.name} → ${d.target}`;

        div.onclick = () => {
            data.splice(i, 1);
            renderList();
        };

        list.appendChild(div);
    });
}

/* ===== START ===== */
function start() {
    if(data.length === 0) return;

    document.getElementById("menu").style.display = "none";
    document.getElementById("game").style.display = "flex";

    progress = {};
    data.forEach(d => progress[d.name] = 0);

    draw();

    const speed = parseFloat(document.getElementById("speed").value) * 1000;

    timer = setInterval(() => {

        let done = true;

        data.forEach(d => {
            if(progress[d.name] < d.target) {
                progress[d.name]++;
                done = false;
            }
        });

        draw();

        if(done) {
            clearInterval(timer);
            showWinner();
        }

    }, speed);
}

/* ===== DRAW CHART ===== */
function draw() {
    const chart = document.getElementById("chart");
    chart.innerHTML = "";

    data.forEach(d => {

        const wrap = document.createElement("div");
        wrap.className = "barWrap";

        const bar = document.createElement("div");
        bar.className = "bar";

        const percent = (progress[d.name] / d.target);
        const height = Math.max(0, Math.min(100, percent * 300));

        bar.style.height = height + "px";

        const label = document.createElement("div");
        label.className = "label";
        label.innerText = d.name;

        wrap.appendChild(bar);
        wrap.appendChild(label);

        chart.appendChild(wrap);
    });
}

/* ===== WINNER ===== */
function showWinner() {

    let winner = data[0];

    data.forEach(d => {
        if(d.target > winner.target) winner = d;
    });

    document.getElementById("winnerText").innerText = winner.name;
    document.getElementById("winner").style.display = "flex";

    setTimeout(() => {
        location.reload();
    }, 5000);
}

</script>

</body>
</html>
